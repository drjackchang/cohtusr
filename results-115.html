<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115 年度成果 | Resilience Together</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <div id="navbar-placeholder"></div>

    <section class="py-5 bg-secondary text-white text-center" style="background: linear-gradient(45deg, #4a5568, #2d3748);">
        <div class="container py-4">
            <span class="badge bg-warning text-dark mb-2">115 年度 (2026) </span>

            <p class="lead">紮根校園多元培力，共築韌性守護社區</p>
        </div>
    </section>

    <section class="py-5" style="margin-top: -40px;">
        <div class="container">
            <div class="row g-4 text-center">
                <div class="col-md-3 col-6">
                    <div class="p-4 bg-white rounded shadow border-bottom border-primary border-4 h-100">
                        <h2 class="fw-bold text-primary display-6 mb-2">4+<span class="fs-5 text-muted">場</span></h2>
                        <p class="text-secondary fw-bold mb-0">專業實作與講座活動(持續增加中)</p>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="p-4 bg-white rounded shadow border-bottom border-primary border-4 h-100">
                        <h2 class="fw-bold text-primary display-6 mb-2">35+<span class="fs-5 text-muted">人次</span></h2>
                        <p class="text-secondary fw-bold mb-0">全年度總參與人數(持續增加中)</p>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="p-4 bg-white rounded shadow border-bottom border-success border-4 h-100">
                        <h2 class="fw-bold text-success display-6 mb-2">35+<span class="fs-5 text-muted">張</span></h2>
                        <p class="text-secondary fw-bold mb-0">核發參加與完訓證書</p>
                        <small class="text-muted d-block mt-1">(含 14+張美國 STB 證書)</small>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="p-4 bg-white rounded shadow border-bottom border-danger border-4 h-100">
                        <h2 class="fw-bold text-danger display-6 mb-2">98 <span class="fs-5 text-muted">%</span></h2>
                        <p class="text-secondary fw-bold mb-0">整體活動滿意度</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5 bg-light">
        <div class="container">
            <div class="text-center mb-5">
                <h3 class="fw-bold">全方位韌性培力計畫</h3>
                <p class="text-muted">從基礎急救到災難醫療，建構堅實的校園防護網</p>
            </div>

<section class="py-5 bg-white">
        <div class="container">
            <div class="text-center mb-5">
                <h3 class="fw-bold">活動現場精選</h3>
                <p class="text-muted">透過實作演練與專業講座，紮根韌性種子</p>
            </div>

            <div id="results-container" class="row">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">資料同步中...</p>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5 bg-dark text-white">
        <div class="container text-center">
            <h3 class="fw-bold mb-4">深入了解 115 年度成果</h3>
            <p class="text-white-50 mb-4">下載完整結案簡報，檢視所有活動照片與滿意度分析數據。</p>
            <a href="#" target="_blank" class="btn btn-warning btn-lg fw-bold px-5">
                <i class="fas fa-file-pdf me-2"></i> 下載 115 年度成果報告書 (PDF) 計畫執行中尚未開放下載
            </a>
        </div>
    </section>

    <div id="footer-placeholder" class="mt-auto w-100"></div>

    <div class="modal fade" id="activityModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl"> 
            <div class="modal-content" style="border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 p-md-5">
                    <div class="row">
                        <div class="col-lg-7 mb-4 mb-lg-0" id="modal-carousel-container">
                        </div>
                        <div class="col-lg-5">
                            <div id="modal-badge-container" class="mb-3"></div>
                            <h2 id="modal-title" class="fw-bold mb-4" style="color: #003366;"></h2>
                            <div id="modal-content" class="lh-lg text-secondary" style="font-size: 1.1rem; max-height: 500px; overflow-y: auto; padding-right: 15px;">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const sheetId = '1vwbGZnHwlGwGxgitaRV9E7U508xVB3kOkDZMhyg0iFI';
    const tabName = encodeURIComponent('115年度成果');
    const resultsUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${tabName}`;

    async function fetch115Results() {
        const container = document.getElementById('results-container');
        if (!container) return;
        
        try {
            const response = await fetch(resultsUrl);
            const text = await response.text();
            
            // 檢查是否成功抓取資料
            const startIdx = text.indexOf('{');
            const endIdx = text.lastIndexOf('}');
            if (startIdx === -1 || endIdx === -1) throw new Error("資料格式錯誤或權限不足");

            const json = JSON.parse(text.substring(startIdx, endIdx + 1));
            const rows = json.table.rows;

            container.innerHTML = ''; // 清除轉圈圈

            rows.forEach((row, index) => {
                if (index === 0) return; // 跳過標題列

                const date = row.c[0]?.v || '';
                const title = row.c[1]?.v || '';
                const summary = row.c[2]?.v || '';
                const content = row.c[3]?.v || '';
                const images = row.c[4]?.v || ''; 
                
                // 抓第一張圖當封面，如果沒圖給預設背景色
                const firstImg = images ? images.split(',')[0].trim() : ''; 
                const imgTag = firstImg ? `<img src="${firstImg}" class="card-img-top" style="height:200px; object-fit:cover;" alt="封面圖">` : `<div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height:200px;"><i class="fas fa-image fa-3x text-muted opacity-25"></i></div>`;

                const cardHtml = `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 shadow-sm border-0" style="cursor:pointer; transition: transform 0.3s;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'" onclick="openDetailModal('${title.replace(/'/g, "\\'")}', '${date}', \`${content.replace(/"/g, '&quot;')}\`, '${images.replace(/'/g, "\\'")}')">
                            ${imgTag}
                            <div class="card-body text-start">
                                <small class="text-primary fw-bold">${date}</small>
                                <h5 class="card-title fw-bold mt-2">${title}</h5>
                                <p class="card-text text-muted small mt-2">${summary}</p>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += cardHtml;
            });
        } catch (error) {
            console.error('抓取成果資料失敗:', error);
            container.innerHTML = '<div class="alert alert-warning w-100 text-center">目前尚無資料或資料同步失敗，請確認試算表權限。</div>';
        }
    }

    function openDetailModal(title, date, content, imgStr) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-badge-container').innerHTML = `<span class="badge bg-primary rounded-pill px-3">${date}</span>`;
        
        // 加上您之前喜歡的排版引擎 (自動替換【】跟**)
        let richText = content
            .replace(/【(.*?)】/g, '<h5 class="fw-bold mt-4 mb-2" style="color: #0052d4; border-bottom: 2px solid #e9ecef; padding-bottom: 8px;"><i class="fas fa-caret-right me-2"></i>$1</h5>')
            .replace(/\*\*(.*?)\*\*/g, '<strong style="background-color: #fff3cd; padding: 2px 6px; border-radius: 4px; color: #856404; font-weight: bold;">$1</strong>')
            .replace(/\n/g, '<br>');
        document.getElementById('modal-content').innerHTML = richText;
        
        // 生成輪播圖 HTML
        const imgs = imgStr.split(',').map(s => s.trim()).filter(url => url);
        let carouselHtml = '';
        
        if (imgs.length > 0) {
            let indicators = '';
            let innerImages = '';
            
            imgs.forEach((url, i) => {
                const isActive = i === 0 ? 'active' : '';
                indicators += `<button type="button" data-bs-target="#carouselExample" data-bs-slide-to="${i}" class="${isActive}" aria-label="Slide ${i+1}"></button>`;
                innerImages += `
                    <div class="carousel-item ${isActive}">
                        <img src="${url}" class="d-block w-100 rounded" style="height:450px; object-fit:cover; background-color: #f8f9fa;">
                    </div>`;
            });
            
            carouselHtml = `
                <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-indicators">${indicators}</div>
                    <div class="carousel-inner">${innerImages}</div>
                    ${imgs.length > 1 ? `
                        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon"></span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                            <span class="carousel-control-next-icon"></span>
                        </button>` : ''}
                </div>`;
        } else {
            carouselHtml = `<div class="d-flex align-items-center justify-content-center bg-light rounded" style="height: 450px;"><i class="fas fa-image fa-4x text-muted opacity-25"></i></div>`;
        }
        
        const carouselArea = document.getElementById('modal-carousel-container');
        if (carouselArea) {
            carouselArea.innerHTML = carouselHtml;
        }
        
        new bootstrap.Modal(document.getElementById('activityModal')).show();
    }

    document.addEventListener('DOMContentLoaded', fetch115Results);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components.js"></script>
</body>
</html>
