<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名 | Resilience Together</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <section class="py-5 bg-primary text-white text-center" style="background: linear-gradient(45deg, #003366, #00509d);">
        <div class="container py-4">
            <h1 class="fw-bold display-5">活動報名與動態</h1>
            <p class="lead">參與培訓與講座，與我們一起建構社區韌性</p>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-end mb-5 border-start border-warning border-5 ps-3">
                <div>
                    <h2 class="fw-bold mb-0">計畫所有活動回顧</h2>
                    <p class="text-muted mb-0 mt-1">同步自 Google 試算表，按時間由新到舊排序</p>
                </div>
            </div>
            
            <div id="news-container" class="row g-4">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">正在同步最新資料...</p>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <div class="modal fade" id="activityModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div id="modal-body-content" class="modal-body pt-0">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components.js"></script>
</body>
</html>
