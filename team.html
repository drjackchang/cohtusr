<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>執行團隊 | Resilience Together</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <section class="py-5 bg-primary text-white text-center" style="background: linear-gradient(45deg, #003366, #00509d);">
        <div class="container py-4">
            <h1 class="fw-bold display-5">執行團隊</h1>
            <p class="lead">院系跨域協作，串聯產官學研韌性力量</p>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <h2 class="fw-bold text-center mb-5">核心領導團隊</h2>
            <div class="row g-4 justify-content-center">
                <div class="col-md-5">
                    <div class="card h-100 border-0 shadow-sm text-center p-4">
                        <div class="mb-3 text-primary"><i class="fas fa-university fa-4x"></i></div>
                        <h4 class="fw-bold">洪論評 院長</h4>
                        <p class="text-primary small fw-bold">計畫主持人</p>
                        <p class="text-secondary small">國立臺北護理健康大學 健康科技學院院長<br>負責計畫跨系所資源整合與行政支持</p>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="card h-100 border-0 shadow-sm text-center p-4">
                        <div class="mb-3 text-primary"><i class="fas fa-user-tie fa-4x"></i></div>
                        <h4 class="fw-bold">張育通 教授</h4>
                        <p class="text-primary small fw-bold">計畫協同主持人</p>
                        <p class="text-secondary small">負責計畫架構設計、專業課程導入<br>及校園與社區韌性實作之推動</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5 bg-light">
        <div class="container">
            <h3 class="fw-bold text-center mb-5">跨領域師資團隊</h3>
            <div class="row g-3 text-center">
                <div class="col-md-3 col-6"><div class="p-3 bg-white rounded shadow-sm">語言治療與聽力學系</div></div>
                <div class="col-md-3 col-6"><div class="p-3 bg-white rounded shadow-sm">長期照護系</div></div>
                <div class="col-md-3 col-6"><div class="p-3 bg-white rounded shadow-sm">休閒產業與健康促進系所</div></div>
                <div class="col-md-3 col-6"><div class="p-3 bg-white rounded shadow-sm">健康科技學院</div></div>
            </div>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <h3 class="fw-bold text-center mb-5">專業 NGO 夥伴</h3>
            <div class="row g-4 text-center">
                <div class="col-md-4"><div class="p-3 border rounded shadow-sm h-100"><h5 class="fw-bold">壯闊台灣聯盟</h5><p class="small text-muted">社區緊急應變推動經驗與社會對話</p></div></div>
                <div class="col-md-4"><div class="p-3 border rounded shadow-sm h-100"><h5 class="fw-bold">台灣醫療救護學會</h5><p class="small text-muted">止血、CPR/AED 專業講師與認證</p></div></div>
                <div class="col-md-4"><div class="p-3 border rounded shadow-sm h-100"><h5 class="fw-bold">台灣災難醫療隊發展協會</h5><p class="small text-muted">大型災難模擬演練與醫療動員</p></div></div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components.js"></script>
</body>
</html>
